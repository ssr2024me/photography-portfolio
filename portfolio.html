<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Photography-life4me</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#080808;--deep:#0f0f0f;--surface:#161616;--border:#2a2a2a;--muted:#777;--text:#c8c0b4;--accent:#d4a853;--white:#f0ece6}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--text);font-family:'Cormorant Garamond',serif;overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1.4rem 4rem;background:rgba(8,8,8,.96);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.15em;color:var(--white);text-decoration:none}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{font-family:'Space Mono',monospace;font-size:.78rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--white);text-decoration:none;transition:color .3s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1.5px;background:var(--accent);transition:width .3s}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}

/* PAGE HEADER */
.page-header{padding:10rem 5rem 4rem;background:var(--deep);border-bottom:1px solid var(--border)}
.page-header-tag{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.4em;color:var(--accent);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:1rem}
.page-header-tag::before{content:'';width:30px;height:1px;background:var(--accent)}
.page-header-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,8vw,7rem);color:var(--white);letter-spacing:.05em;line-height:.9}
.page-header-sub{font-size:1.1rem;font-weight:300;font-style:italic;color:var(--muted);margin-top:1.5rem;max-width:500px;line-height:1.7}
.photo-count{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.2em;color:var(--muted);margin-top:1rem}

/* FILTER */
.filter-bar{padding:2rem 5rem;background:var(--black);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;position:sticky;top:64px;z-index:100}
.filter-label{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-right:.5rem}
.filter-tab{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--border);padding:.5rem 1.2rem;cursor:pointer;transition:all .3s}
.filter-tab.active,.filter-tab:hover{color:var(--black);background:var(--accent);border-color:var(--accent)}

/* MASONRY */
.masonry-container{padding:3rem 5rem 5rem;column-count:3;column-gap:1.2rem}
@media(max-width:1000px){.masonry-container{column-count:2}}
@media(max-width:600px){.masonry-container{column-count:1}}

.masonry-item{break-inside:avoid;margin-bottom:1.2rem;position:relative;overflow:hidden;cursor:pointer;opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.masonry-item.visible{opacity:1;transform:translateY(0)}
.masonry-item img{width:100%;display:block;filter:brightness(.85);transition:transform .7s,filter .5s}
.masonry-item:hover img{transform:scale(1.04);filter:brightness(1)}
.masonry-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,8,.9) 0%,transparent 55%);opacity:0;transition:opacity .4s}
.masonry-item:hover .masonry-overlay{opacity:1}
.masonry-caption{position:absolute;bottom:0;left:0;right:0;padding:1.8rem 1.2rem 1rem;opacity:0;transform:translateY(6px);transition:all .4s}
.masonry-item:hover .masonry-caption{opacity:1;transform:translateY(0)}
.masonry-caption-title{font-size:1.1rem;font-style:italic;color:var(--white)}
.masonry-caption-cat{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-top:.3rem}
.masonry-caption-desc{font-size:.9rem;color:rgba(200,192,180,.7);margin-top:.4rem;line-height:1.5}
.masonry-item.hidden{display:none}

.gallery-loading{text-align:center;padding:5rem;font-family:'Space Mono',monospace;font-size:.75rem;color:var(--muted);letter-spacing:.2em;column-span:all}
.no-photos{text-align:center;padding:5rem;font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;color:var(--muted)}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(8,8,8,.97);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column}
.lightbox.open{display:flex}
.lb-img-wrap{position:relative;max-width:88vw;max-height:80vh}
.lightbox img{max-width:88vw;max-height:80vh;object-fit:contain;animation:lbIn .3s ease;display:block}
@keyframes lbIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.lb-close{position:absolute;top:2rem;right:3rem;font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.2em;color:var(--muted);cursor:pointer;transition:color .3s;background:none;border:none}
.lb-close:hover{color:var(--accent)}
.lb-info{margin-top:1.5rem;text-align:center}
.lb-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;color:var(--white)}
.lb-cat{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-top:.3rem}
.lb-desc{font-size:.95rem;color:var(--muted);margin-top:.5rem;max-width:500px;line-height:1.6}
.lb-nav{display:flex;gap:1.5rem;margin-top:1rem}
.lb-nav-btn{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.15em;color:var(--muted);cursor:pointer;background:none;border:1px solid var(--border);padding:.5rem 1.2rem;transition:all .3s;text-transform:uppercase}
.lb-nav-btn:hover{color:var(--accent);border-color:var(--accent)}

footer{background:var(--deep);border-top:1px solid var(--border);padding:2.5rem 5rem;display:flex;align-items:center;justify-content:space-between}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.15em;color:rgba(240,236,230,.35)}
.footer-logo span{color:var(--accent)}
.footer-copy{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--muted)}
.footer-links{display:flex;gap:2rem}
.footer-links a{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.15em;color:var(--muted);text-decoration:none;text-transform:uppercase;transition:color .3s}
.footer-links a:hover{color:var(--accent)}

/* ═══════════════════════════════════════
   RESPONSIVE — MOBILE & TABLET
═══════════════════════════════════════ */
@media (max-width:768px){
  /* NAV */
  nav{padding:1rem 1.2rem}
  .nav-logo{font-size:1.2rem}
  .nav-links{gap:1.2rem}
  .nav-links a{font-size:.65rem;letter-spacing:.1em}

  /* HERO */
  .hero{grid-template-columns:1fr;height:auto;min-height:100vh}
  .hero-left{padding:6rem 1.5rem 2rem;order:2}
  .hero-right{height:55vw;min-height:250px;order:1}
  .hero-title{font-size:clamp(3.5rem,15vw,6rem)}
  .hero-name{font-size:clamp(.9rem,3vw,1.2rem)}
  .hero-sub{font-size:1rem;max-width:100%}
  .hero-btns{flex-direction:column;gap:.8rem}
  .btn-gold,.btn-outline{text-align:center;width:100%;max-width:280px}

  /* FEATURED GRID */
  .feat-grid{grid-template-columns:1fr 1fr!important}
  .feat-item:first-child{grid-column:span 2}

  /* CATEGORY GRID */
  .cat-grid{grid-template-columns:1fr 1fr!important}

  /* PAGE HEADER */
  .page-header{padding:7rem 1.5rem 2.5rem}
  .page-header-title{font-size:clamp(2.5rem,12vw,5rem)}

  /* PORTFOLIO MASONRY */
  .masonry-container{column-count:2!important;padding:1.5rem}

  /* ABOUT */
  .about-split{flex-direction:column!important;gap:2rem}
  .about-img-wrap{width:100%!important;height:280px}
  .about-text{padding:0!important}
  .about-stats{grid-template-columns:1fr 1fr!important}
  .about-gear-grid{grid-template-columns:1fr 1fr!important}
  .timeline{padding-left:1.5rem!important}

  /* CONTACT */
  .contact-body{grid-template-columns:1fr!important;padding:2rem 1.5rem;gap:2.5rem}
  .contact-hero{padding:7rem 1.5rem 3rem}

  /* FOOTER */
  footer{flex-direction:column;gap:.8rem;text-align:center;padding:1.5rem}
  .footer-links{justify-content:center}

  /* FILTER BAR */
  .filter-bar{padding:1rem 1.2rem;gap:.5rem;top:56px}
  .filter-tab{padding:.4rem .8rem;font-size:.55rem}
}

@media (max-width:480px){
  nav{padding:.9rem 1rem}
  .nav-links{gap:.8rem}
  .nav-links a{font-size:.6rem}
  .hero-title{font-size:clamp(3rem,18vw,5rem)}
  .feat-grid{grid-template-columns:1fr!important}
  .feat-item:first-child{grid-column:span 1}
  .cat-grid{grid-template-columns:1fr!important}
  .masonry-container{column-count:1!important;padding:1rem}
  .about-stats{grid-template-columns:1fr 1fr!important}
  .about-gear-grid{grid-template-columns:1fr!important}
  .contact-body{padding:1.5rem 1rem}
  .contact-hero{padding:6rem 1rem 2.5rem}
  .page-header{padding:6rem 1rem 2rem}
  .page-header-title{font-size:clamp(2rem,14vw,4rem)}
  .filter-tab{padding:.35rem .6rem;font-size:.52rem}
}

@media (min-width:769px) and (max-width:1024px){
  .hero{grid-template-columns:1fr 1fr}
  .hero-left{padding:6rem 2.5rem 3rem}
  .hero-title{font-size:clamp(4rem,8vw,7rem)}
  .feat-grid{grid-template-columns:repeat(3,1fr)!important}
  .masonry-container{column-count:2!important;padding:2rem}
  .contact-body{grid-template-columns:1fr 1fr!important;padding:3rem 2rem;gap:3rem}
  .about-gear-grid{grid-template-columns:repeat(2,1fr)!important}
}

/* HAMBURGER MENU */
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:.3rem;z-index:201}
.hamburger span{width:22px;height:2px;background:var(--white);transition:all .3s;display:block}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}
@media(max-width:768px){
  .hamburger{display:flex}
  .nav-links{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(8,8,8,.97);flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;z-index:200}
  .nav-links.open{display:flex}
  .nav-links a{font-size:1.1rem;letter-spacing:.2em}
}

</style>
</head>
<body>

<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">[ CLOSE × ]</button>
  <img id="lbImg" src="" alt="">
  <div class="lb-info">
    <div class="lb-title" id="lbTitle"></div>
    <div class="lb-cat" id="lbCat"></div>
    <div class="lb-desc" id="lbDesc"></div>
    <div class="lb-nav">
      <button class="lb-nav-btn" onclick="lbNav(-1)">← Prev</button>
      <button class="lb-nav-btn" onclick="lbNav(1)">Next →</button>
    </div>
  </div>
</div>

<nav>
  <a href="index.html" class="nav-logo">PHOTOGRAPHY<span>-</span>LIFE4ME</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="portfolio.html" class="active">Portfolio</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact_page.html">Contact</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="page-header-tag">02 — My Work</div>
  <h1 class="page-header-title">PORTFOLIO</h1>
  <p class="page-header-sub">A collection of moments frozen in time — nature, macro, landscapes and more.</p>
  <div class="photo-count" id="photoCount">Loading...</div>
</div>

<div class="filter-bar" id="filterBar">
  <span class="filter-label">Filter:</span>
  <button class="filter-tab active" data-cat="all">All</button>
</div>

<div class="masonry-container" id="masonryGrid">
  <div class="gallery-loading">Photos load ho rahi hain...</div>
</div>

<footer>
  <div class="footer-logo">PHOTOGRAPHY<span>-</span>LIFE4ME</div>
  <div class="footer-copy">© 2026 Shubham Sagar</div>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact_page.html">Contact</a>
  </div>
</footer>

<script>
const API='api.php';
let allPhotos=[], filteredPhotos=[], currentLbIdx=0;

window.addEventListener('load', async ()=>{
  // Check URL param for category
  const urlCat = new URLSearchParams(window.location.search).get('cat');

  try{
    const data=await(await fetch(API+'?action=get_list')).json();
    allPhotos=data.photos||[];
    document.getElementById('photoCount').textContent=allPhotos.length+' photographs';

    // Build filter tabs
    const cats=['all',...new Set(allPhotos.map(p=>p.category))];
    const bar=document.getElementById('filterBar');
    bar.innerHTML='<span class="filter-label">Filter:</span>';
    cats.forEach(c=>{
      const btn=document.createElement('button');
      btn.className='filter-tab'+(c==='all'&&!urlCat||c===urlCat?' active':'');
      btn.dataset.cat=c;
      btn.textContent=c==='all'?'All':c;
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderMasonry(c==='all'?allPhotos:allPhotos.filter(p=>p.category===c));
      });
      bar.appendChild(btn);
    });

    // Apply URL category if present
    if(urlCat){
      renderMasonry(allPhotos.filter(p=>p.category===urlCat));
    } else {
      renderMasonry(allPhotos);
    }

  }catch(e){
    document.getElementById('masonryGrid').innerHTML='<div class="gallery-loading" style="color:#c07070">Error: '+e.message+'</div>';
  }
});

function renderMasonry(photos){
  filteredPhotos=photos;
  const grid=document.getElementById('masonryGrid');
  grid.innerHTML='';
  if(!photos.length){grid.innerHTML='<div class="no-photos">Is category mein koi photo nahi.</div>';return;}

  photos.forEach((p,i)=>{
    const item=document.createElement('div');
    item.className='masonry-item';
    item.innerHTML=`
      <img src="${API}?action=get_image&id=${p.id}" alt="${p.title}" loading="lazy">
      <div class="masonry-overlay"></div>
      <div class="masonry-caption">
        <div class="masonry-caption-title">${p.title}</div>
        <div class="masonry-caption-cat">${p.category}</div>
        ${p.description?`<div class="masonry-caption-desc">${p.description}</div>`:''}
      </div>`;
    item.addEventListener('click',()=>openLightbox(i));
    grid.appendChild(item);
    setTimeout(()=>item.classList.add('visible'), 50+i*60);
  });
}

function openLightbox(idx){
  currentLbIdx=idx;
  const p=filteredPhotos[idx];
  document.getElementById('lbImg').src=API+'?action=get_image&id='+p.id;
  document.getElementById('lbTitle').textContent=p.title;
  document.getElementById('lbCat').textContent=p.category;
  document.getElementById('lbDesc').textContent=p.description||'';
  document.getElementById('lightbox').classList.add('open');
}
function lbNav(dir){
  let next=currentLbIdx+dir;
  if(next<0)next=filteredPhotos.length-1;
  if(next>=filteredPhotos.length)next=0;
  openLightbox(next);
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeLightbox();
  if(e.key==='ArrowRight')lbNav(1);
  if(e.key==='ArrowLeft')lbNav(-1);
});
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))closeLightbox();});
</script>
<script src="cursor-particles.js"></script>
<script src="js/page-transitions.js">
window.addEventListener("pageshow", function(e) {
  document.querySelectorAll(".page-transition").forEach(el => {
    el.style.animation = "none";
    el.style.transform = "scaleY(0)";
    el.style.visibility = "hidden";
  });
});
</script>
</body>
</html>
